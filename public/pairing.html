<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust+ Provider - Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 bg-light p-3">
                <h4><i class="bi bi-gear"></i> Rust+ Provider</h4>
                <hr>
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#pairing" data-bs-toggle="tab">
                            <i class="bi bi-link-45deg"></i> Server Pairing
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/servers">
                            <i class="bi bi-database"></i> Server Data
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/api-docs">
                            <i class="bi bi-book"></i> API Documentation
                        </a>
                    </li>
                </ul>
                
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 p-4">
                <div class="tab-content">
                    <!-- Pairing Tab -->
                    <div class="tab-pane fade show active" id="pairing">
                        <h2><i class="bi bi-link-45deg"></i> Server Pairing</h2>
                        <p class="text-muted">Manage your Rust+ server connections and FCM tokens.</p>
                        
                        <!-- Token Status -->
                        <div id="tokenStatus" class="token-status">
                            <div class="d-flex align-items-center">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                <span>Loading token status...</span>
                            </div>
                        </div>
                        
                        <!-- Token Management -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5><i class="bi bi-key"></i> FCM Token Management</h5>
                            </div>
                            <div class="card-body">
                                <form id="tokenForm">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <label for="username" class="form-label">Steam Username</label>
                                            <input type="text" class="form-control" id="username" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="password" class="form-label">Steam Password</label>
                                            <input type="password" class="form-control" id="password" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="twoFactor" class="form-label">2FA Code (Optional)</label>
                                            <input type="text" class="form-control" id="twoFactor" placeholder="Leave empty if no 2FA">
                                        </div>
                                    </div>
                                    <div class="mt-3">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-arrow-clockwise"></i> Update FCM Tokens
                                        </button>
                                        <button type="button" class="btn btn-danger ms-2" id="deleteTokens">
                                            <i class="bi bi-trash"></i> Delete Tokens
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        
                        <!-- Paired Servers -->
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5><i class="bi bi-server"></i> Paired Servers</h5>
                                <button class="btn btn-outline-primary btn-sm" id="refreshServers">
                                    <i class="bi bi-arrow-clockwise"></i> Refresh
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="serversList">
                                    <div class="text-center py-4">
                                        <div class="spinner-border" role="status"></div>
                                        <p class="mt-2">Loading servers...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="navigation.js"></script>
    <script src="pairing.js"></script>
</body>
</html>
